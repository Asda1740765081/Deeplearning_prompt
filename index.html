<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f7f5">
  <title>DeepPrompt Lab - 深度学习研究提示词库</title>
  <style>
    :root{--bg:#f4f6f4;--surface:#fff;--surface-2:#eef2ef;--ink:#17201d;--muted:#67736e;--line:#dce3df;--teal:#087f78;--teal-soft:#dcefeb;--coral:#e4674f;--shadow:0 10px 30px rgba(27,48,41,.09);--radius:8px}
    [data-theme="dark"]{--bg:#141a18;--surface:#1d2522;--surface-2:#26302c;--ink:#edf4f1;--muted:#a5b3ad;--line:#35423d;--teal:#55c5bb;--teal-soft:#193d39;--coral:#f18a73;--shadow:0 12px 34px rgba(0,0,0,.28)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0;min-height:100vh}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:228px minmax(0,1fr);min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:24px 16px;border-right:1px solid var(--line);background:color-mix(in srgb,var(--surface) 92%,transparent);display:flex;flex-direction:column;z-index:20}.brand{display:flex;align-items:center;gap:10px;padding:0 8px 22px}.brand-mark{width:34px;height:34px;border-radius:7px;background:var(--ink);color:var(--surface);display:grid;place-items:center;font:700 17px/1 Georgia}.brand strong{display:block;font-size:15px}.brand span{display:block;color:var(--muted);font-size:10px;margin-top:2px}.nav-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;padding:10px 10px 8px}.nav{display:grid;gap:3px}.nav button{width:100%;border:0;background:transparent;display:flex;align-items:center;gap:10px;padding:10px;border-radius:6px;text-align:left;font-size:13px}.nav button:hover,.nav button.active{background:var(--surface-2)}.nav button.active{color:var(--teal);font-weight:700}.nav .ico{width:20px;text-align:center;font-size:15px}.count{margin-left:auto;font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:2px 6px;border-radius:10px}.sidebar-foot{margin-top:auto;border-top:1px solid var(--line);padding:14px 8px 0}.tip{font-size:11px;line-height:1.6;color:var(--muted)}.main{min-width:0}.topbar{height:72px;padding:0 32px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(12px);position:sticky;top:0;z-index:15}.mobile-menu{display:none}.search{position:relative;flex:1;max-width:650px}.search input{width:100%;height:40px;border:1px solid var(--line);background:var(--surface);border-radius:7px;padding:0 42px 0 38px;outline:none}.search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px color-mix(in srgb,var(--teal) 13%,transparent)}.search .search-ico{position:absolute;left:13px;top:10px;color:var(--muted)}kbd{position:absolute;right:10px;top:10px;border:1px solid var(--line);background:var(--surface-2);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--muted)}.icon-btn{width:38px;height:38px;border:1px solid var(--line);background:var(--surface);border-radius:7px;display:grid;place-items:center}.icon-btn:hover{border-color:var(--teal);color:var(--teal)}.content{padding:28px 32px 60px;max-width:1440px;margin:auto}.intro{min-height:172px;border-bottom:1px solid var(--line);margin-bottom:26px;padding:5px 38% 26px 0;background:url('assets/neural-field.png') right center/52% auto no-repeat}.eyebrow{font:700 11px/1.2 ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--teal);text-transform:uppercase}.intro h1{font-family:Georgia,"Songti SC",serif;font-size:32px;line-height:1.18;margin:11px 0 9px;letter-spacing:0}.intro p{font-size:13px;color:var(--muted);line-height:1.7;max-width:550px;margin:0}.stats{display:flex;gap:18px;margin-top:18px}.stats span{font-size:11px;color:var(--muted)}.stats b{color:var(--ink);font-size:15px;margin-right:4px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:16px}.section-head h2{font:700 18px/1.2 Georgia,"Songti SC",serif;margin:0}.section-head p{font-size:11px;color:var(--muted);margin:5px 0 0}.sort{border:1px solid var(--line);background:var(--surface);border-radius:6px;padding:7px 10px;font-size:11px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;min-height:222px;display:flex;flex-direction:column;transition:.18s ease}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--teal) 44%,var(--line))}.card-top{display:flex;align-items:flex-start;justify-content:space-between}.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--teal);background:var(--teal-soft);padding:5px 7px;border-radius:5px}.fav{border:0;background:transparent;font-size:18px;color:var(--muted);padding:0}.fav.on{color:var(--coral)}.card h3{font-size:15px;margin:15px 0 8px}.card p{font-size:11px;line-height:1.7;color:var(--muted);margin:0}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}.tag{font-size:9px;border:1px solid var(--line);padding:3px 6px;border-radius:4px;color:var(--muted)}.card-actions{display:flex;align-items:center;gap:7px;margin-top:auto;padding-top:15px}.primary,.secondary{height:34px;border-radius:6px;padding:0 12px;font-size:11px;font-weight:700}.primary{border:0;background:var(--ink);color:var(--surface);flex:1}.primary:hover{background:var(--teal)}.secondary{border:1px solid var(--line);background:var(--surface)}.secondary:hover{border-color:var(--teal);color:var(--teal)}.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted);border:1px dashed var(--line);border-radius:var(--radius)}.drawer-backdrop{position:fixed;inset:0;background:rgba(8,18,15,.28);opacity:0;pointer-events:none;transition:.2s;z-index:30}.drawer{position:fixed;right:0;top:0;width:min(540px,100%);height:100vh;background:var(--surface);z-index:31;box-shadow:-12px 0 40px rgba(0,0,0,.15);transform:translateX(101%);transition:.25s ease;display:flex;flex-direction:column}.drawer.open{transform:none}.drawer-backdrop.open{opacity:1;pointer-events:auto}.drawer-head{padding:22px 24px 17px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:14px}.drawer-head h2{font:700 21px/1.3 Georgia,"Songti SC",serif;margin:6px 0 0;flex:1}.drawer-body{overflow:auto;padding:20px 24px 110px}.drawer-body h4{font-size:11px;margin:18px 0 8px;text-transform:uppercase;color:var(--muted)}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:11px;font-weight:700}.field input,.field textarea{border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:10px 11px;outline:none;font-size:12px}.field textarea{resize:vertical;min-height:72px}.field input:focus,.field textarea:focus{border-color:var(--teal)}.prompt-box{white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:15px;font:11px/1.75 ui-monospace,SFMono-Regular,Consolas,monospace;max-height:320px;overflow:auto}.drawer-foot{position:absolute;bottom:0;left:0;right:0;padding:14px 24px;border-top:1px solid var(--line);background:var(--surface);display:flex;gap:9px}.drawer-foot .primary{height:42px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:var(--surface);padding:10px 15px;border-radius:6px;font-size:11px;z-index:50;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:1060px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.intro{padding-right:30%;background-size:62%}}
    @media(max-width:760px){.app{display:block}.sidebar{position:fixed;left:0;transform:translateX(-101%);transition:.2s;width:240px;box-shadow:var(--shadow)}.sidebar.open{transform:none}.topbar{height:62px;padding:0 16px}.mobile-menu{display:grid}.content{padding:20px 16px 50px}.intro{min-height:190px;padding:0 0 22px;background-position:right bottom;background-size:92% auto}.intro h1{font-size:27px;max-width:75%}.intro p{max-width:78%}.grid{grid-template-columns:1fr}.card{min-height:205px}.drawer{top:auto;bottom:0;height:90vh;border-radius:8px 8px 0 0;transform:translateY(101%)}.drawer.open{transform:none}.section-head{align-items:center}.stats{gap:12px}kbd{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-mark">DP</div><div><strong>DeepPrompt Lab</strong><span>RESEARCH PROMPT LIBRARY</span></div></div>
    <div class="nav-label">研究流程</div><nav class="nav" id="nav"></nav>
    <div class="sidebar-foot"><div class="tip">所有模板均在本地运行与保存。填写变量后，即可生成适合 ChatGPT、Claude、Codex 等模型的完整提示词。</div></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="icon-btn mobile-menu" id="menuBtn" title="打开导航">☰</button>
      <div class="search"><span class="search-ico">⌕</span><input id="search" placeholder="搜索论文阅读、实验设计、代码调试…" autocomplete="off"><kbd>Ctrl K</kbd></div>
      <button class="icon-btn" id="themeBtn" title="切换主题">◐</button>
    </header>
    <div class="content">
      <section class="intro"><div class="eyebrow">Deep Learning Research Toolkit</div><h1>把研究问题，变成<br>高质量提示词</h1><p>围绕论文、实验、代码、写作与组会汇报整理的结构化 Prompt。选择模板，补充研究信息，立即获得可执行的 AI 指令。</p><div class="stats"><span><b id="totalStat">17</b>个模板</span><span><b>7</b>类研究任务</span><span><b id="favStat">0</b>个收藏</span></div></section>
      <div class="section-head"><div><h2 id="sectionTitle">全部模板</h2><p id="sectionDesc">覆盖从文献调研到论文投稿的完整流程</p></div><select class="sort" id="sort"><option value="default">推荐排序</option><option value="name">按名称</option><option value="fav">收藏优先</option></select></div>
      <section class="grid" id="grid"></section>
    </div>
  </main>
</div>
<div class="drawer-backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer"><div class="drawer-head"><div><span class="badge" id="drawerBadge"></span><h2 id="drawerTitle"></h2></div><button class="icon-btn" id="closeDrawer" title="关闭">×</button></div><div class="drawer-body"><p id="drawerDesc" style="font-size:12px;color:var(--muted);line-height:1.7;margin:0"></p><h4>补充研究信息</h4><div id="fields"></div><h4>生成的提示词</h4><div class="prompt-box" id="promptPreview"></div></div><div class="drawer-foot"><button class="secondary" id="resetBtn">重置</button><button class="primary" id="copyFinal">复制完整提示词</button></div></aside>
<div class="toast" id="toast">已复制到剪贴板</div>
<script>
const categories=[
 {id:'all',name:'全部模板',icon:'⌘',desc:'覆盖从文献调研到论文投稿的完整流程'},
 {id:'reading',name:'论文阅读',icon:'▤',desc:'理解、拆解与批判性阅读论文'},
 {id:'writing',name:'论文写作',icon:'✎',desc:'润色、改写与审稿回复'},
 {id:'experiment',name:'实验设计',icon:'⚗',desc:'消融、基线与可复现实验'},
 {id:'coding',name:'代码研发',icon:'⌁',desc:'实现、调试与性能优化'},
 {id:'ideation',name:'研究创新',icon:'✦',desc:'选题、创新点与研究路线'},
 {id:'presentation',name:'组会汇报',icon:'▣',desc:'周报、图表、讲稿与演示文稿设计'},
 {id:'favorite',name:'我的收藏',icon:'♥',desc:'你收藏的常用提示词'}
];
const prompts=[
 {id:'paper-deep-read',cat:'reading',icon:'▤',title:'论文深度精读',desc:'从问题定义、方法、实验到局限，分层拆解一篇深度学习论文。',tags:['结构化阅读','方法分析'],fields:[['paper','论文内容或摘要','粘贴论文摘要、方法章节或全文…','textarea'],['background','你的研究背景','例如：我正在研究小样本图像分类','input']],template:`你是一位资深深度学习研究员。请对下面的论文进行深度精读，并面向具有「{{background}}」背景的研究者解释。\n\n论文内容：\n{{paper}}\n\n请按以下结构输出：\n1. 一句话核心贡献与研究问题\n2. 关键假设及其合理性\n3. 方法流程：用步骤和必要的公式解释，不遗漏张量维度\n4. 相比已有工作的实质差异\n5. 实验设计是否足以支持结论\n6. 三项优势、三项局限\n7. 可复现要点与潜在失败模式\n8. 对我的研究最值得借鉴的三个方向\n\n对论文未明确给出的信息标注“论文未说明”，不要自行杜撰。`},
 {id:'paper-fast',cat:'reading',icon:'◫',title:'三分钟速读',desc:'快速判断论文是否值得投入时间精读，并提炼关键结论。',tags:['快速筛选','文献调研'],fields:[['abstract','标题与摘要','粘贴论文标题和摘要…','textarea'],['goal','当前调研目标','例如：寻找高效注意力机制','input']],template:`你是我的论文筛选助手。我的调研目标是「{{goal}}」。请阅读以下标题与摘要：\n\n{{abstract}}\n\n用三分钟速读格式输出：\n- 这篇论文解决什么问题（1句话）\n- 核心方法与最重要的结果\n- 与我的调研目标的相关度（0-100）及理由\n- 新颖性、可靠性、可复现性各给出1-5分\n- 值得精读的章节\n- 最终建议：精读 / 略读 / 跳过\n\n保持简洁，不超过500字。`},
 {id:'formula',cat:'reading',icon:'∑',title:'公式逐步推导',desc:'解释论文中的数学公式、符号、维度与直觉，并检查推导。',tags:['数学推导','直觉解释'],fields:[['formula','公式与上下文','粘贴公式及前后文…','textarea'],['level','期望讲解程度','例如：机器学习硕士一年级','input']],template:`请以「{{level}}」可理解的程度，逐步解释下面的深度学习公式及上下文：\n\n{{formula}}\n\n要求：\n1. 建立符号表，说明每个变量的含义、类型和维度\n2. 从上一行到下一行逐步推导，不跳步\n3. 同时给出数学解释和直觉解释\n4. 用一个最小数值例子验证\n5. 检查维度、边界条件与潜在错误\n6. 最后说明该公式在模型训练或推理中的实际作用。`},
 {id:'polish',cat:'writing',icon:'✎',title:'学术英文润色',desc:'提升英文论文的准确性、连贯性与学术表达，不改变原意。',tags:['英文润色','学术写作'],fields:[['text','英文原文','粘贴需要润色的段落…','textarea'],['venue','目标期刊或会议','例如：NeurIPS / IEEE TPAMI','input']],template:`你是一位熟悉深度学习论文的学术编辑。请按「{{venue}}」的专业写作风格润色以下英文：\n\n{{text}}\n\n要求：\n- 保留技术含义、引用标记、LaTeX 公式和术语\n- 提高语法准确性、逻辑衔接、简洁性和学术语气\n- 避免夸大、空泛表达与不必要的复杂词汇\n- 不添加原文没有的实验结论\n\n输出：\n1. 润色后的完整文本\n2. 修改说明表（原表达 / 修改后 / 原因）\n3. 若存在逻辑或证据问题，单独列出，不要擅自修正。`},
 {id:'review-response',cat:'writing',icon:'↩',title:'审稿意见回复',desc:'逐条构建专业、克制、有证据的 rebuttal 或回复信。',tags:['Rebuttal','投稿'],fields:[['review','审稿意见','粘贴审稿人意见…','textarea'],['evidence','已有证据或计划修改','列出实验结果、文中位置或拟补充内容…','textarea']],template:`你是深度学习领域的论文作者，请协助回复以下审稿意见。\n\n审稿意见：\n{{review}}\n\n已有证据或计划修改：\n{{evidence}}\n\n先判断每条意见属于误解、表达不清、证据不足还是实质缺陷，再起草回复。语气应感谢、专业、直接，不防御、不夸大。每条按以下格式：\n- Reviewer comment（简述）\n- Response（先直接回答，再给证据）\n- Changes in manuscript（具体章节、修改动作）\n- 若当前证据不足，明确建议补做的最小实验\n\n不要虚构页码、实验结果或引用。`},
 {id:'abstract',cat:'writing',icon:'¶',title:'摘要结构优化',desc:'检查并重写摘要，使问题、方法、结果与贡献信息完整。',tags:['摘要','逻辑优化'],fields:[['text','当前摘要','粘贴摘要…','textarea'],['limit','字数限制','例如：150-200 words','input']],template:`请以顶级深度学习会议论文的标准诊断并优化以下摘要，字数限制为「{{limit}}」：\n\n{{text}}\n\n检查是否清楚包含：研究背景与缺口、具体问题、方法核心、量化结果、主要贡献。\n输出：\n1. 信息缺口与逻辑问题（简洁列点）\n2. 重写后的英文摘要\n3. 每句话在摘要中的功能标注\n\n不得虚构数字；缺失的结果用 [RESULT] 占位。避免“novel”“significant”等无证据形容词。`},
 {id:'ablation',cat:'experiment',icon:'⚗',title:'消融实验设计',desc:'围绕模块、损失和训练策略设计有解释力的消融矩阵。',tags:['消融实验','因果分析'],fields:[['method','方法概述','说明模型模块、损失函数和训练策略…','textarea'],['budget','计算预算','例如：4×A100，最多30组实验','input']],template:`你是一名严谨的深度学习实验设计专家。请为以下方法设计消融实验：\n\n方法：{{method}}\n计算预算：{{budget}}\n\n请：\n1. 画出待验证假设与模型组件的对应关系\n2. 设计最小但有解释力的实验矩阵，区分组件、交互项、超参数和训练策略\n3. 为每组实验给出变量、控制项、指标、预期现象及反例解释\n4. 标记必须做、建议做、预算充足再做\n5. 说明随机种子、置信区间、显著性检验和失败判据\n6. 给出可直接用于论文的消融表格空模板。`},
 {id:'baseline',cat:'experiment',icon:'≋',title:'基线与指标选择',desc:'为研究问题建立公平、现代且可复现的比较方案。',tags:['Baseline','评估指标'],fields:[['task','研究任务','描述任务、数据集和主要挑战…','textarea'],['claim','核心主张','例如：更高效且小样本性能更好','input']],template:`围绕研究任务「{{task}}」和核心主张「{{claim}}」，制定公平的基线与评估方案。\n\n请输出：\n- 基线分组：经典、当前强基线、最相关工作、简单下界与上界\n- 每个基线被选择的理由及公平复现条件\n- 主要指标、辅助指标和效率指标，说明其局限\n- 数据划分、预处理、调参预算与模型规模的统一规则\n- 统计报告规范和结果表结构\n- 哪些比较最可能遭到审稿人质疑，以及预防措施\n\n不要编造具体 SOTA 数值；不确定的最新基线标注“需检索确认”。`},
 {id:'debug',cat:'coding',icon:'⌁',title:'训练异常诊断',desc:'系统定位 loss、梯度、显存、数值稳定性与数据问题。',tags:['Debug','PyTorch'],fields:[['symptom','异常现象与日志','粘贴报错、loss 曲线描述或关键日志…','textarea'],['code','相关代码','粘贴最小相关代码，可留空…','textarea']],template:`你是一位资深深度学习工程师，请诊断以下训练异常。\n\n异常现象与日志：\n{{symptom}}\n\n相关代码：\n{{code}}\n\n请不要直接猜一个答案。按概率从高到低列出假设，并为每个假设提供：\n1. 支持与反对证据\n2. 最小验证步骤或监控代码\n3. 确认后的最小修复\n\n依次检查数据、标签、前向维度、损失、梯度、优化器、混合精度、分布式训练和随机性。最后给出一个不超过10步的排查顺序。修改代码时保留原有接口。`},
 {id:'implement',cat:'coding',icon:'{ }',title:'论文方法复现',desc:'把论文方法转成模块划分、伪代码与可验证的实现计划。',tags:['代码实现','复现'],fields:[['method','论文方法描述','粘贴方法章节、公式或算法…','textarea'],['stack','技术栈与约束','例如：PyTorch 2.x，单卡24GB','input']],template:`请将下面的论文方法转化为可复现的工程实现方案。\n\n方法描述：\n{{method}}\n\n技术栈与约束：{{stack}}\n\n输出：\n1. 输入输出契约与张量维度表\n2. 模块划分及依赖关系\n3. 与公式逐项对应的清晰伪代码\n4. 训练、验证、推理流程\n5. 最容易实现错误的细节\n6. 单元测试、数值检查和最小过拟合测试\n7. 分阶段实现清单及每阶段验收标准\n\n论文没有说明的实现细节，请明确列为“待决策项”并给出保守默认值。`},
 {id:'idea',cat:'ideation',icon:'✦',title:'研究创新点生成',desc:'从真实研究缺口出发形成可证伪、可实验的创新方向。',tags:['创新点','选题'],fields:[['area','研究主题','例如：医学图像分割中的域泛化','input'],['observations','已知问题或观察','描述现有方法痛点、失败案例或资源条件…','textarea']],template:`你是我的深度学习研究导师。围绕主题「{{area}}」，基于以下观察提出研究方向：\n\n{{observations}}\n\n先区分事实、假设与待验证问题，再提出5个候选创新点。每个方向包括：\n- 研究缺口与可证伪假设\n- 核心机制（避免只做模块堆叠）\n- 相对现有方法可能新增的价值\n- 最小可行实验、关键基线与成功标准\n- 最大风险和失败后仍有价值的结论\n- 新颖性、可行性、影响力各1-5分\n\n最后选择一个最值得优先验证的方向，并给出两周研究计划。不要把未经检索的想法声称为“首次”。`},
 {id:'roadmap',cat:'ideation',icon:'→',title:'研究路线规划',desc:'把模糊想法拆解为问题、里程碑、实验与投稿路径。',tags:['研究计划','里程碑'],fields:[['goal','研究目标','描述你想解决的问题…','textarea'],['resources','时间与资源','例如：3个月，2张4090，有某数据集','input']],template:`请把以下深度学习研究目标转化为可执行路线：\n\n研究目标：{{goal}}\n时间与资源：{{resources}}\n\n请输出：\n1. 问题定义、研究边界与成功标准\n2. 必须先验证的三个关键假设\n3. 从最低成本到完整方案的实验阶梯\n4. 周粒度里程碑，每个里程碑含交付物和停止条件\n5. 数据、算力、工程与学术风险清单及预案\n6. 文献检索关键词组合\n7. 最终论文故事线和必要证据清单\n\n计划应允许早期失败，优先安排信息增益最高的实验。`},
 {id:'weekly-slides',cat:'presentation',icon:'▣',title:'组会周报 PPT',desc:'把一周的阅读、实验和问题整理成逻辑清晰的完整汇报。',tags:['周报大纲','PPT'],fields:[['work','本周所学与完成内容','列出阅读论文、学习知识、代码与实验进展…','textarea'],['context','汇报要求','例如：10分钟，导师和实验室同学，8-10页','input']],template:`你是一位深度学习研究组的学术汇报设计师。请将以下本周内容整理为组会 PPT。\n\n本周内容：\n{{work}}\n\n汇报要求：{{context}}\n\n请先提炼一条贯穿汇报的主线，再逐页输出：\n- 页码与页面标题（标题必须表达该页结论，而非只写主题）\n- 本页目标\n- 3-5条精炼要点，每条不超过两行\n- 建议使用的视觉内容：架构图、流程图、公式、表格、曲线或示意图\n- 具体版式：元素位置、视觉层级、强调色与留白\n- 该页讲解时间与自然过渡句\n\n建议结构包含：本周目标、核心学习、论文洞见、实验进展、失败与诊断、待解决问题、下周计划。控制总页数和时长，不编造论文结论或实验数据，缺失信息用 [待补充] 标记。最后给出整套 PPT 的标题、配色和字体建议。`},
 {id:'slide-designer',cat:'presentation',icon:'□',title:'单页 PPT 视觉设计',desc:'将一段复杂研究内容变成信息清晰、可直接绘制的单页。',tags:['单页设计','版式'],fields:[['content','本页原始内容','粘贴想在这一页表达的知识、方法或结论…','textarea'],['purpose','页面目的与风格','例如：解释 Transformer 注意力机制；简洁学术风','input']],template:`请把以下研究内容设计成一页专业的组会 PPT。\n\n原始内容：\n{{content}}\n\n页面目的与风格：{{purpose}}\n\n请输出：\n1. 一句结论型页面标题\n2. 信息删减：必须保留、可移到讲稿、应删除的内容\n3. 页面结构：使用坐标式描述各区域的位置和占比\n4. 每个文本框的最终文案，避免大段文字\n5. 最适合的视觉表达及绘制步骤；若为流程图，列出节点和连线；若为图表，列出坐标轴、图例和标注\n6. 字号层级、颜色、对齐、间距和强调方式\n7. 30-60秒讲稿\n\n保持一页一个观点，最多三层视觉层级，不使用装饰性图形，不编造内容。`},
 {id:'paper-to-slides',cat:'presentation',icon:'◇',title:'论文方法图解',desc:'把论文方法章节转化为适合组会讲解的架构图与幻灯片。',tags:['论文汇报','方法图'],fields:[['method','论文方法内容','粘贴摘要、方法章节、公式或现有图注…','textarea'],['audience','听众背景与页数','例如：了解 CNN，但不了解扩散模型；3页','input']],template:`你是一名擅长科学可视化的深度学习研究者。请把下面的论文方法转化为适合组会的图解型幻灯片。\n\n论文方法：\n{{method}}\n\n听众与页数：{{audience}}\n\n请：\n1. 提炼输入、核心模块、信息流、输出和训练目标\n2. 设计由“问题直觉 → 整体架构 → 关键模块/公式”递进的页面\n3. 对每页给出结论型标题、精简文案和讲解顺序\n4. 为架构图列出所有节点、形状、颜色编码、箭头方向、张量维度和图例\n5. 标注适合逐步出现的动画顺序，但不使用无意义动画\n6. 解释原论文图中可能引发误解的部分\n7. 生成每页讲稿及页间过渡句\n\n只根据提供的内容作图；论文未说明的连接、维度或训练细节必须标注 [未说明]。`},
 {id:'results-story',cat:'presentation',icon:'↗',title:'实验结果可视化',desc:'选择合适图表并组织结果叙事，让实验结论更容易被理解。',tags:['结果图表','数据叙事'],fields:[['results','实验结果','粘贴表格、指标、观察或训练日志摘要…','textarea'],['claim','希望说明的核心结论','例如：方法在低数据量下更稳定','input']],template:`请将以下深度学习实验结果转化为组会 PPT 中清晰、诚实的数据叙事。\n\n实验结果：\n{{results}}\n\n希望说明的核心结论：{{claim}}\n\n请输出：\n1. 先检查数据能否支持该结论，指出混杂因素和不能声称的内容\n2. 推荐最合适的图表类型，并解释为什么不用其他图表\n3. 给出可直接绘图的数据映射：横纵轴、系列、单位、排序、误差线和基线\n4. 标题、图注、关键数值标注和高亮规则\n5. 主结果、消融、失败案例分别如何分页\n6. 每页的结论型标题、版式和45秒讲稿\n7. 建议补充的统计量或对照实验\n\n禁止截断坐标轴制造夸张差异；不得补造缺失数值。`},
 {id:'speaker-notes',cat:'presentation',icon:'◉',title:'汇报讲稿与预演',desc:'生成自然讲稿、时间分配和可能被追问的问题。',tags:['讲稿','Q&A'],fields:[['slides','PPT 页面内容','按页粘贴标题和要点…','textarea'],['duration','汇报时长与听众','例如：12分钟，导师和同方向研究生','input']],template:`请为以下深度学习组会 PPT 编写自然、专业的汇报讲稿并辅助预演。\n\nPPT 内容：\n{{slides}}\n\n时长与听众：{{duration}}\n\n逐页输出：\n- 建议用时\n- 口语化讲稿：解释而非照读页面\n- 应指向或强调的图表元素\n- 与上一页、下一页的过渡句\n- 本页可能被打断追问的问题\n\n然后给出：\n1. 总时间检查和可删减页面\n2. 导师最可能提出的10个问题及简洁回答思路\n3. 对方法合理性、实验公平性和失败案例的高压追问\n4. 30秒开场与20秒总结\n5. 无法回答时专业且诚实的回应方式\n\n不要虚构论文细节或实验结果；答案依赖缺失信息时标记 [需确认]。`}
];
let activeCat='all',activePrompt=null;const favs=new Set(JSON.parse(localStorage.getItem('dp-favs')||'[]'));
const $=s=>document.querySelector(s),nav=$('#nav'),grid=$('#grid'),search=$('#search');
function renderNav(){nav.innerHTML=categories.map(c=>`<button class="${activeCat===c.id?'active':''}" data-cat="${c.id}"><span class="ico">${c.icon}</span>${c.name}<span class="count">${c.id==='all'?prompts.length:c.id==='favorite'?favs.size:prompts.filter(p=>p.cat===c.id).length}</span></button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{activeCat=b.dataset.cat;render();$('#sidebar').classList.remove('open')})}
function filtered(){let q=search.value.trim().toLowerCase(),list=prompts.filter(p=>(activeCat==='all'||p.cat===activeCat||(activeCat==='favorite'&&favs.has(p.id)))&&(!q||[p.title,p.desc,...p.tags,categories.find(c=>c.id===p.cat)?.name].join(' ').toLowerCase().includes(q)));let s=$('#sort').value;if(s==='name')list.sort((a,b)=>a.title.localeCompare(b.title,'zh'));if(s==='fav')list.sort((a,b)=>Number(favs.has(b.id))-Number(favs.has(a.id)));return list}
function render(){renderNav();let c=categories.find(x=>x.id===activeCat);$('#sectionTitle').textContent=c.name;$('#sectionDesc').textContent=c.desc;let list=filtered();grid.innerHTML=list.length?list.map(p=>`<article class="card"><div class="card-top"><span class="badge">${p.icon} ${categories.find(c=>c.id===p.cat).name}</span><button class="fav ${favs.has(p.id)?'on':''}" data-fav="${p.id}" title="收藏">${favs.has(p.id)?'♥':'♡'}</button></div><h3>${p.title}</h3><p>${p.desc}</p><div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="card-actions"><button class="primary" data-open="${p.id}">填写并生成</button><button class="secondary" data-copy="${p.id}">复制模板</button></div></article>`).join(''):`<div class="empty">没有找到匹配的提示词。换个关键词试试。</div>`;grid.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openPrompt(b.dataset.open));grid.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copyText(prompts.find(p=>p.id===b.dataset.copy).template));grid.querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>toggleFav(b.dataset.fav));$('#favStat').textContent=favs.size}
function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);localStorage.setItem('dp-favs',JSON.stringify([...favs]));render()}
function openPrompt(id){activePrompt=prompts.find(p=>p.id===id);$('#drawerBadge').textContent=`${activePrompt.icon} ${categories.find(c=>c.id===activePrompt.cat).name}`;$('#drawerTitle').textContent=activePrompt.title;$('#drawerDesc').textContent=activePrompt.desc;$('#fields').innerHTML=activePrompt.fields.map(([key,label,ph,type])=>`<div class="field"><label for="f-${key}">${label}</label>${type==='textarea'?`<textarea id="f-${key}" data-key="${key}" placeholder="${ph}"></textarea>`:`<input id="f-${key}" data-key="${key}" placeholder="${ph}">`}</div>`).join('');$('#fields').querySelectorAll('[data-key]').forEach(el=>el.oninput=updatePreview);updatePreview();$('#drawer').classList.add('open');$('#backdrop').classList.add('open');document.body.style.overflow='hidden'}
function updatePreview(){if(!activePrompt)return;let text=activePrompt.template;activePrompt.fields.forEach(([key,label])=>{let v=$(`#f-${key}`)?.value.trim()||`[请填写：${label}]`;text=text.replaceAll(`{{${key}}}`,v)});$('#promptPreview').textContent=text}
function closeDrawer(){$('#drawer').classList.remove('open');$('#backdrop').classList.remove('open');document.body.style.overflow=''}
async function copyText(text){try{await navigator.clipboard.writeText(text)}catch{let t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}let toast=$('#toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}
search.oninput=render;$('#sort').onchange=render;$('#closeDrawer').onclick=closeDrawer;$('#backdrop').onclick=closeDrawer;$('#copyFinal').onclick=()=>copyText($('#promptPreview').textContent);$('#resetBtn').onclick=()=>{$('#fields').querySelectorAll('input,textarea').forEach(x=>x.value='');updatePreview()};$('#themeBtn').onclick=()=>{let next=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=next;localStorage.setItem('dp-theme',next)};$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open');document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();search.focus()}if(e.key==='Escape')closeDrawer()});document.documentElement.dataset.theme=localStorage.getItem('dp-theme')||'light';render();
</script>
</body>
